<!DOCTYPE html>
<html lang="th">

<head>

    <meta charset="UTF-8">
    <title>Borrow System</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


</head>

<body>

    <!-- LOGIN -->

    <div id="login" class="page">

        <div class="login-box">

            <h2>Login</h2>

            <input type="text" placeholder="Username">
            <input type="password" placeholder="Password">

            <button onclick="showPage('dashboard')">Login</button>

        </div>

    </div>

    <!-- DASHBOARD -->

    <div id="dashboard" class="page">

        <div class="topbar">
            Borrow Equipment System
        </div>

        <h2>เมนู</h2>

        <!-- DASHBOARD STATS -->

        <div class="stats">

            <div class="stat-card">
                <h3>21</h3>
                <p>อุปกรณ์ทั้งหมด</p>
            </div>

            <div class="stat-card">
                <h3>5</h3>
                <p>กำลังถูกยืม</p>
            </div>

            <div class="stat-card">
                <h3>16</h3>
                <p>อุปกรณ์ว่าง</p>
            </div>

        </div>

        <div class="menu-cards">

            <button class="card-btn" onclick="showPage('borrow')">
                <i class="fa-solid fa-box"></i>
                <span>ยืมอุปกรณ์</span>
            </button>

            <button class="card-btn" onclick="showPage('return')">
                <i class="fa-solid fa-rotate-left"></i>
                <span>คืนอุปกรณ์</span>
            </button>

            <button class="card-btn" onclick="showPage('equipment')">
                <i class="fa-solid fa-list"></i>
                <span>รายการอุปกรณ์</span>
            </button>

            <button class="card-btn" onclick="showPage('history')">
                <i class="fa-solid fa-clock-rotate-left"></i>
                <span>ประวัติ</span>
            </button>

        </div>




    </div>

    <!-- BORROW -->

    <div id="borrow" class="page">

        <div class="topbar">
            ยืมอุปกรณ์
        </div>
        <input type="date" id="borrowDate">
        <input type="text" id="borrower" placeholder="ชื่อผู้ยืม">

        <select id="item">

            <option>T.016397</option>
            <option>T.016398</option>
            <option>SOLAR01</option>
            <option>AM.36971</option>

        </select>

        <br>

        <button onclick="borrowItem()">ยืม</button>
        <button class="back-btn" onclick="showPage('dashboard')">กลับ</button>


    </div>

    <!-- RETURN -->

    <div id="return" class="page">

        <div class="topbar">
            คืนอุปกรณ์
        </div>

        <input type="text" placeholder="รหัสอุปกรณ์">

        <br>

        <button>คืน</button>
        <button class="back-btn" onclick="showPage('dashboard')">กลับ</button>


    </div>

    <!-- EQUIPMENT -->

    <div id="equipment" class="page">

        <div class="topbar">
            รายการอุปกรณ์
        </div>

        <!-- SEARCH -->

        <input type="text" id="searchInput" placeholder="ค้นหาอุปกรณ์..." onkeyup="searchItem()">

        <table>

            <tr>
                <th>รหัส</th>
                <th>สถานะ</th>
                <th>ผู้ยืม</th>
                <th>วันที่</th>
            </tr>

            <tr>
                <td>T.016397</td>
                <td class="status-free">ว่าง</td>
                <td>-</td>
                <td>-</td>
            </tr>

            <tr>
                <td>SOLAR01</td>
                <td class="status-borrow">ถูกยืม</td>
                <td>สมชาย</td>
                <td>12/03/2026</td>
            </tr>

        </table>


        <button class="back-btn" onclick="showPage('dashboard')">กลับ</button>


    </div>

    <!-- HISTORY -->

    <div id="history" class="page">

        <div class="topbar">
            ประวัติการยืม
        </div>

        <table>

            <tr>
                <th>ผู้ยืม</th>
                <th>อุปกรณ์</th>
                <th>วันที่</th>
            </tr>

            <tr>
                <td>สมชาย</td>
                <td>T.016397</td>
                <td>12/03/2026</td>
            </tr>

        </table>

        <button class="back-btn" onclick="showPage('dashboard')">กลับ</button>


    </div>

    <script src="script.js"></script>

</body>

</html>
